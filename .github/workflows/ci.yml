name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v22

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Reject CRLF in shell scripts
        run: |
          rc=0
          grep -rP --include='*.sh' '\r' plugins/ || rc=$?
          if [ "$rc" -eq 0 ]; then
            echo "::error::CRLF detected in shell scripts"
            exit 1
          elif [ "$rc" -ne 1 ]; then
            echo "::error::CRLF scan failed (grep exit code $rc)"
            exit 1
          fi
      - name: ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          for dir in plugins/*/scripts; do
            if [ -d "$dir" ]; then
              echo "Checking $dir..."
              (
                cd "$dir" || exit 1
                shopt -s nullglob
                files=(*.sh lib/*.sh)
                shopt -u nullglob
                if [ ${#files[@]} -gt 0 ]; then
                  shellcheck -x "${files[@]}"
                fi
              ) || exit 1
            fi
          done
