name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v22

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Reject CRLF in shell scripts
        run: |
          if grep -rP '\r' plugins/*/scripts/*.sh 2>/dev/null; then
            echo "::error::CRLF detected in shell scripts"
            exit 1
          fi
      - name: ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck plugins/*/scripts/*.sh
